name: "Sync versions on release"

on:
  push:
    tags:
      - 'network/v*.*.*'
      - 'protect/v*.*.*'
      - 'access/v*.*.*'
      - 'core/v*.*.*'
      - 'shared/v*.*.*'
      - 'relay/v*.*.*'
      - 'v*.*.*'  # Legacy tag format (network)

# Debounce: if multiple tags are pushed within seconds, only the last
# workflow run proceeds. Earlier runs detect the branch has moved and skip.
concurrency:
  group: bump-versions
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bump:
    name: Sync all version references
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0
        fetch-tags: true
        token: ${{ secrets.PUSH_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Detect tagged versions and update files
      run: |
        get_version() {
          local prefix="$1"
          git tag --list "${prefix}/v*" --sort=-version:refname | head -1 | sed "s|${prefix}/v||"
        }

        get_legacy_version() {
          git tag --list "v*.*.*" --sort=-version:refname | head -1 | sed 's|^v||'
        }

        update_json_version() {
          local json_file="$1"
          local version="$2"

          if [ -z "$version" ] || [ ! -f "$json_file" ]; then
            return
          fi

          current=$(python3 -c "import json; print(json.load(open('${json_file}')).get('version', ''))")
          if [ "$current" = "$version" ]; then
            echo "  $json_file already at $version"
            return
          fi

          python3 -c "
        import json, sys
        pj = sys.argv[1]
        ver = sys.argv[2]
        with open(pj) as f:
            data = json.load(f)
        data['version'] = ver
        with open(pj, 'w') as f:
            json.dump(data, f, indent=2)
            f.write('\n')
        " "$json_file" "$version"
          echo "  $json_file: $current -> $version"
        }

        update_mcp_package_pin() {
          local json_file="$1"
          local version="$2"

          if [ -z "$version" ] || [ ! -f "$json_file" ]; then
            return
          fi

          python3 -c "
        import json, re, sys
        pj = sys.argv[1]
        ver = sys.argv[2]
        with open(pj) as f:
            data = json.load(f)
        pkg_pin = re.compile(r'^(unifi-[a-z]+-mcp)==')
        for server in data.get('mcpServers', {}).values():
            args = server.get('args', [])
            for i, arg in enumerate(args):
                m = pkg_pin.match(arg)
                if m:
                    args[i] = f'{m.group(1)}=={ver}'
                    break
            else:
                raise SystemExit(f'{pj}: no unifi-*-mcp package pin found in args {args!r}')
        with open(pj, 'w') as f:
            json.dump(data, f, indent=2)
            f.write('\n')
        " "$json_file" "$version"
          echo "  $json_file package pin -> $version"
        }

        update_plugin_version() {
          local plugin_dir="$1"
          local version="$2"

          if [ -z "$version" ]; then
            return
          fi

          update_json_version "$plugin_dir/.claude-plugin/plugin.json" "$version"
          update_json_version "$plugin_dir/.codex-plugin/plugin.json" "$version"
          update_mcp_package_pin "$plugin_dir/.claude-plugin/plugin.json" "$version"
          update_mcp_package_pin "$plugin_dir/.mcp.json" "$version"
        }

        NETWORK_VERSION=$(get_version "network")
        if [ -z "$NETWORK_VERSION" ]; then
          NETWORK_VERSION=$(get_legacy_version)
        fi
        PROTECT_VERSION=$(get_version "protect")
        ACCESS_VERSION=$(get_version "access")
        CORE_VERSION=$(get_version "core")
        SHARED_VERSION=$(get_version "shared")
        RELAY_VERSION=$(get_version "relay")

        echo "Detected versions:"
        echo "  Network: ${NETWORK_VERSION:-not tagged}"
        echo "  Protect: ${PROTECT_VERSION:-not tagged}"
        echo "  Access:  ${ACCESS_VERSION:-not tagged}"
        echo "  Core:    ${CORE_VERSION:-not tagged}"
        echo "  Shared:  ${SHARED_VERSION:-not tagged}"
        echo "  Relay:   ${RELAY_VERSION:-not tagged}"

        # Update Claude/Codex plugin manifests and MCP package pins
        update_plugin_version "plugins/unifi-network" "$NETWORK_VERSION"
        update_plugin_version "plugins/unifi-protect" "$PROTECT_VERSION"
        update_plugin_version "plugins/unifi-access" "$ACCESS_VERSION"

        # Regenerate server.json manifests for MCP Registry
        if [ -n "$NETWORK_VERSION" ]; then
          python3 scripts/generate_server_manifest.py --app network --version "$NETWORK_VERSION"
        fi
        if [ -n "$PROTECT_VERSION" ]; then
          python3 scripts/generate_server_manifest.py --app protect --version "$PROTECT_VERSION"
        fi
        if [ -n "$ACCESS_VERSION" ]; then
          python3 scripts/generate_server_manifest.py --app access --version "$ACCESS_VERSION"
        fi

    - name: Commit and push if changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add -A

        if git diff --cached --quiet; then
          echo "No version changes to commit"
          exit 0
        fi

        git commit -m "chore(plugins): sync plugin versions to current release tags"
        git push
