version: 3
config_version: 9
embedding:
  provider: ollama
  model: bge-m3:latest
capture:
  transcript_paths: []
  plan_dirs:
    - docs/superpowers/plans/
    - docs/superpowers/specs/
    - docs/plans
  ignore_plan_dirs_in_git: true
  artifact_extensions:
    - .md
  buffer_max_events: 500
release_provenance:
  enabled: true
  production_refs:
    - refs/tags/network/v*
    - refs/tags/protect/v*
    - refs/tags/access/v*
    - refs/tags/core/v*
    - refs/tags/shared/v*
    - refs/tags/relay/v*
    - refs/tags/api/v*
  integration_refs:
    - origin/main
  reconcile_interval_minutes: 15
  production_debug_include_unknown: true
  github:
    repo: sirkirby/unifi-mcp
    token_env: GITHUB_TOKEN
    max_lookups_per_run: 20
  package_map:
    - path_glob: packages/unifi-core/
      tag_pattern: refs/tags/core/v*
    - path_glob: packages/unifi-mcp-relay/
      tag_pattern: refs/tags/relay/v*
    - path_glob: packages/unifi-mcp-shared/
      tag_pattern: refs/tags/shared/v*
    - path_glob: apps/network/
      tag_pattern: refs/tags/network/v*
    - path_glob: apps/protect/
      tag_pattern: refs/tags/protect/v*
    - path_glob: apps/access/
      tag_pattern: refs/tags/access/v*
    - path_glob: apps/api/
      tag_pattern: refs/tags/api/v*
agent:
  summary_batch_interval: 10
  scheduled_tasks_enabled: true
  event_tasks_enabled: true
  cold_project_threshold_days: 14
  provider:
    type: anthropic
  harness: claude-sdk
  tasks:
    skill-generate:
      provider:
        type: anthropic
        model: claude-sonnet-4-6
        reasoning_map:
          low: claude-haiku-4-5-20251001
          default: claude-sonnet-4-6
          high: claude-opus-4-6
      harness: claude-sdk
      phases:
        validate:
          maxTurns: 25
      schedule:
        enabled: true
    skill-evolve:
      provider:
        type: anthropic
        model: claude-sonnet-4-6
        reasoning_map:
          low: claude-haiku-4-5-20251001
          default: claude-sonnet-4-6
          high: claude-opus-4-6
      harness: claude-sdk
      schedule:
        enabled: true
    canopy-describe:
      provider:
        type: lmstudio
        base_url: http://10.29.13.49:1234
        model: openai/gpt-oss-20b
        reasoning_map:
          low: openai/gpt-oss-20b
          default: openai/gpt-oss-20b
      harness: openai-agents
      schedule:
        enabled: true
skills:
  confidence_threshold: 0.7
  usage_stale_days: 30
notifications:
  enabled: true
  system_notifications: true
  default_mode: summary
  domains:
    mycelium:
      enabled: false
    sessions:
      enabled: false
    settings:
      enabled: true
      mode: banner
cortex:
  enabled: true
  instructions:
    inject_on_session_start: true
  digest:
    tier: 5000
    inject_on_session_start: false
  spores:
    inject_on_prompt_submit: true
    max_per_prompt: 3
  canopy:
    refresh:
      background_enabled: true
      background_period_minutes: 60
    exclude:
      default_patterns:
        - .git
        - .DS_Store
        - node_modules
        - __pycache__
        - .venv
        - venv
        - env
        - ENV
        - .pytest_cache
        - .ruff_cache
        - .mypy_cache
        - .tox
        - dist
        - build
        - target
        - .gradle
        - .cache
        - .next
        - .nuxt
        - .turbo
        - .svelte-kit
        - "**/*.lock"
        - "**/package-lock.json"
        - "**/pnpm-lock.yaml"
        - "**/yarn.lock"
      patterns: []
    inject_on_pre_tool_use: true
    min_file_bytes: 800
